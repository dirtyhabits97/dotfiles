- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.aerospace.toml:
    ~/bin:
    ~/.gitattributes:
    ~/.gitconfig:
    ~/.gitconfig-dev.config:
    ~/.lldbinit:
    ~/.tmux.conf:
    ~/.zsh:
    ~/.zshrc:
      force: true
    ~/.config/:
      create: true
      glob: true
      path: config/*
      force: true
      exclude:
        - config/vifm
        - config/Battle.net
        - config/op
        - config/htop
        - config/jgit
    ~/.config/vifm/:
      create: true
      glob: true
      force: true
      path: config/vifm/*
      exclude: [config/vifm/vifminfo.json]
    # This is a work machine: Claude Code reads from ~/.claude, not ~/.config/claude.
    # Link only our tracked items so infra-managed files (plugins, telemetry, auth) stay untouched.
    ~/.claude/settings.json:
      path: claude/settings.json
      force: true
    ~/.claude/bin:
      path: claude/bin
      force: true
    ~/lldb/scripts:
      create: true
      path: lldb/scripts

- create:
  - ~/lldb
  - ~/logs
  - ~/mocks
  - ~/other_projects
  - ~/projects
